---
- name: Deploy task-manager to prod
  hosts: prod
  become: yes
  vars:
    image: "yourdockerhubusername/task-manager:{{ image_tag }}"

  tasks:
    - name: Pull latest Docker image
      command: "docker pull {{ image }}"

    - name: Stop existing container
      command: docker stop task-manager
      ignore_errors: yes

    - name: Remove existing container
      command: docker rm task-manager
      ignore_errors: yes

    - name: Run new container
      command: >
        docker run -d --name task-manager
        -p 8080:8080 {{ image }}

    - name: Verify deployment
      uri:
        url: http://localhost:8080/health
        status_code: 200
      retries: 5
      delay: 5
